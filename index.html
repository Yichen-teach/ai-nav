        // ===== 渲染工具卡片 =====  
        const grid = document.getElementById('toolsGrid');  
        const noResults = document.getElementById('noResults');  
        const searchInput = document.getElementById('searchInput');  
        const toolCount = document.getElementById('toolCount');  
  
        function renderTools(filteredTools) {  
            grid.innerHTML = '';  
              
            if (filteredTools.length === 0) {  
                noResults.style.display = 'block';  
                grid.style.display = 'none';  
                return;  
            }  
  
            noResults.style.display = 'none';  
            grid.style.display = 'grid';  
  
            filteredTools.forEach((tool, index) => {  
                const card = document.createElement('div');  
                card.className = 'tool-card';  
                card.style.animationDelay = `${index * 0.03}s`;  
                card.onclick = () => window.open(tool.url, '_blank');  
  
                const tagClass = `tag-${tool.category}`;  
                const bgClass = `bg-${tool.category}`;  
                const categoryNames = {  
                    chat: 'AI对话', image: 'AI绘画', video: 'AI视频',  
                    write: 'AI写作', code: 'AI编程', office: 'AI办公',  
                    search: 'AI搜索', design: 'AI设计', music: 'AI音乐'  
                };  
  
                card.innerHTML = `  
                    <div class="tool-header">  
                        <div class="tool-emoji ${bgClass}">${tool.emoji}</div>  
                        <div>  
                            <div class="tool-name">${tool.name}</div>  
                            <span class="tool-tag ${tagClass}">${categoryNames[tool.category]}</span>  
                        </div>  
                    </div>  
                    <div class="tool-desc">${tool.desc}</div>  
                    <div class="tool-footer">  
                        <div class="tool-badges">  
                            ${tool.free ? '<span class="badge free">✓ 免费可用</span>' : '<span class="badge">付费</span>'}  
                            ${tool.china ? '<span class="badge china">🇨🇳 国产</span>' : ''}  
                        </div>  
                        <a href="${tool.url}" target="_blank" class="visit-btn" onclick="event.stopPropagation()">访问 →</a>  
                    </div>  
                `;  
  
                grid.appendChild(card);  
            });  
        }  
  
        // ===== 分类筛选 =====  
        let currentCategory = 'all';  
  
        document.getElementById('categories').addEventListener('click', (e) => {  
            if (!e.target.classList.contains('cat-btn')) return;  
  
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));  
            e.target.classList.add('active');  
  
            currentCategory = e.target.dataset.category;  
            filterAndRender();  
        });  
  
        // ===== 搜索功能 =====  
        searchInput.addEventListener('input', () => {  
            filterAndRender();  
        });  
  
        function filterAndRender() {  
            const query = searchInput.value.toLowerCase().trim();  
            let filtered = tools;  
  
            if (currentCategory !== 'all') {  
                filtered = filtered.filter(t => t.category === currentCategory);  
            }  
  
            if (query) {  
                filtered = filtered.filter(t =>   
                    t.name.toLowerCase().includes(query) ||  
                    t.desc.toLowerCase().includes(query) ||  
                    t.category.toLowerCase().includes(query)  
                );  
            }  
  
            renderTools(filtered);  
        }  
  
        // ===== 回到顶部按钮 =====  
        window.addEventListener('scroll', () => {  
            const btn = document.getElementById('backTop');  
            btn.style.display = window.scrollY > 500 ? 'flex' : 'none';  
        });  
  
        // ===== 初始化 =====  
        toolCount.textContent = tools.length;  
        renderTools(tools);  
    </script>
